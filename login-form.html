<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Job Matching Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
    <div class="logo">Job Matching Portal</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>

    <div class="nav-actions">
        <a href="login.html" class="btn-outline">Login</a>
        <a href="register.html" class="btn-primary">Register</a>
    </div>
</nav>

<!-- ================= LOGIN FORM ================= -->
<section class="auth-section">
    <div class="auth-card">

        <!-- This text will be set by JS later -->
        <h2 id="loginRoleTitle">Login</h2>
        <p class="auth-subtitle">
            Please enter your credentials to continue.
        </p>

        <form id="loginForm" autocomplete="off">


            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                     autocomplete="off"
                    id="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                autocomplete="new-password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <!-- JS will handle submit later -->
            <button type="submit" id="loginSubmitBtn" class="auth-btn">
                Login
            </button>
        </form>

        <p class="auth-footer">
            Don’t have an account?
            <a href="register.html">Register</a>
        </p>

    </div>
</section>

<!-- JS will be attached later -->
<script src="assets/login.js"></script>
</body>
</html>
