<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jobs | Job Seeker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/style.css">

  <!-- Role protection -->
  <script src="../assets/auth-guard.js"></script>
  <script>
    requireRole("JOBSEEKER");
  </script>

  <!-- Jobs Logic -->
  <script defer src="../assets/jobseeker-jobs.js"></script>
</head>
<body>

<!-- ========== TOP BAR ========== -->
<header class="topbar">
  <div class="topbar-left">
    <span class="logo">Job Matching Portal</span>
    <nav class="top-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="jobs.html" class="active">Jobs</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </div>

  <div class="topbar-right">
    <span class="user-name" id="jobUserName"></span>
  </div>
</header>

<!-- ========== LAYOUT ========== -->
<div class="dashboard-layout">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-link">Dashboard</a>
    <a href="jobs.html" class="sidebar-link active">Job Listings</a>
    <a href="profile.html" class="sidebar-link">Profile</a>
  </aside>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="dashboard-content">

    <h1 class="page-title">Job Listings</h1>

    <!-- ========== SEARCH & FILTERS ========== -->
    <section class="job-filters" data-feature="filters">

      <input
        type="text"
        placeholder="Search by job title..."
        id="searchTitle"
      >

      <select id="filterSkill">
        <option value="">Filter by Skill</option>
      </select>

      <select id="filterLocation">
        <option value="">Filter by Location</option>
      </select>

      <button class="btn-primary" id="searchBtn">
        Search
      </button>
    </section>

    <!-- ========== JOB COUNT ========== -->
    <p class="job-count">
      Showing <strong id="shownCount">0</strong>
      of <strong id="totalCount">0</strong> jobs
    </p>

    <!-- ========== JOB LIST (DYNAMIC) ========== -->
    <section class="job-list" id="jobList">
      <!-- 
        Job cards injected by JS

        Expected structure per job (JS will generate):

        <div class="job-card">
          <div class="job-left">
            <h3>Job Title</h3>

            <div class="job-status-bar">
              Job Status: ACTIVE
              <span class="app-status applied">APPLIED</span>
            </div>

            <!-- company / location / skills -->

            <!-- ACTION AREA -->
            <div class="job-actions">
              <!-- 
                JS will inject:
                <button class="btn-secondary view-recruiter-btn"
                        data-recruiter-id="RECRUITER_ID">
                  View Recruiter Profile
                </button>
              -->
            </div>

          </div>

          <div class="job-right">
            <!-- skill match, apply / selected / rejected buttons -->
          </div>
        </div>
      -->
    </section>

    <!-- ========== PAGINATION (FUTURE) ========== -->
    <div class="pagination" id="pagination" style="display:none;"></div>

  </main>
</div>

<footer class="footer">
  © 2024 Job Matching Portal
</footer>

</body>
</html>
