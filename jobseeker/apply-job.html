<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply Job | Job Seeker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/style.css">

  <!-- Role protection -->
  <script src="../assets/auth-guard.js"></script>
  <script>
    requireRole("JOBSEEKER");
  </script>

  <!-- Apply Job Logic -->
  <script defer src="../assets/jobseeker-apply.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo">Job Matching Portal</span>
    <nav class="top-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="jobs.html" class="active">Jobs</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </div>

  <div class="topbar-right">
    <span class="user-name" id="applyUserName"></span>
  </div>
</header>

<div class="dashboard-layout">

  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-link">Dashboard</a>
    <a href="jobs.html" class="sidebar-link active">Job Listings</a>
    <a href="profile.html" class="sidebar-link">Profile</a>
  </aside>

  <main class="dashboard-content">

    <!-- JOB HEADER -->
    <section class="job-header">
      <h1 id="jobTitle"></h1>
      <p class="company" id="jobCompany"></p>
      <p class="location" id="jobLocation"></p>
    </section>

    <!-- MATCH SUMMARY -->
    <section class="job-match-summary">
      <div class="match-left">
        <span class="match-label">Skill Match</span>
        <span class="match-percent" id="matchPercent"></span>
        <div class="match-bar">
          <div class="match-fill" id="matchBar"></div>
        </div>
      </div>

      <button class="apply-btn primary" id="applyBtn">
        Apply
      </button>
    </section>

    <!-- WHY JOB -->
    <section class="why-this-job">
      <h2>🔍 Why this job is recommended for you</h2>
      <ul id="whyList"></ul>
    </section>

    <!-- JOB DETAILS -->
    <section class="job-details">

      <div class="job-info-grid">
        <div class="job-info-card">
          <h3>Key Skills</h3>
          <div class="skill-tags" id="skillTags"></div>
          <p class="skill-gap-note" id="skillGapNote"></p>
        </div>

        <div class="job-info-card">
          <h3>Experience Required</h3>
          <p id="experienceRequired"></p>
        </div>
      </div>

      <div class="job-section">
        <h3>Job Requirements</h3>
        <ul id="jobRequirements"></ul>
      </div>

      <div class="job-section">
        <h3>Company Overview</h3>
        <p id="companyOverview"></p>
      </div>

    </section>

  </main>
</div>

<footer class="footer">
  © 2024 Job Matching Portal
</footer>

</body>
</html>
